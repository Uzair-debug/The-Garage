<script>
  const WRAP = { W: 1080, H: 1350 };
  const COLOR = {
    bg: '#0d0d0f', surface: '#16161a', surface2: '#1e1e24',
    border: 'rgba(255,255,255,0.08)', accent: '#e63030', accentHot: '#ff5a3c',
    text: '#f0f0f0', muted: '#9a9a9a', dim: '#5a5a5a',
  };

  async function init() {
    initAuth();
    const params = new URLSearchParams(location.search);
    const userId = params.get('id');
    const root = document.getElementById('wrapped-root');

    if (!userId) {
      root.innerHTML = emptyState('No profile found', 'Pick a build owner to see their wrap-up.');
      return;
    }

    const [cars, currentUser, card] = await Promise.all([
      getCarsByUser(userId), getCurrentUser(), getMemberCard(userId), initLikes(),
    ]);

    if (!cars.length) {
      root.innerHTML = emptyState('Nothing to wrap yet', 'This garage is still empty — add a car first.');
      return;
    }

    const isMe = currentUser && currentUser.id === userId;
    const displayName = (card && card.display_name) || (cars[0].owner || 'Unknown');
    const carIds = cars.map(c => c.id);
    const year = new Date().getFullYear();
    const yearStart = new Date(year, 0, 1).toISOString();

    const [updatesAll, commentsAll, ogIds, momentum, repsYear, commentsRecvYear, commentsGivenYear, updatesYear, sentIn, sentOut] =
      await Promise.all([
        getUpdateCountByUser(userId),
        getCommentCountByUser(userId),
        getOGBuilderIds(),
        getMonthlyMomentum(),
        getRepsEarnedSince(carIds, yearStart),
        getCommentsReceivedSince(carIds, yearStart),
        getCommentsGivenSince(userId, yearStart),
        getUpdatesPostedSince(userId, yearStart),
        isMe ? getMyCallouts() : Promise.resolve(null),
        isMe ? getMySentCallouts() : Promise.resolve(null),
      ]);

    const totalMods = cars.reduce((n, c) => n + (c.mods ? c.mods.length : 0), 0);
    const totalReps = cars.reduce((n, c) => n + (c.likes || 0), 0);
    const isBuildOfMonth = !!momentum.topId && cars.some(c => c.id === momentum.topId);
    const badgeStats = {
      carsCount: cars.length, totalMods, totalReps,
      updatesCount: updatesAll, commentsCount: commentsAll,
      isOG: ogIds.has(userId), isBuildOfMonth,
    };
    if (isMe) badgeStats.calloutCount = (sentIn || []).length + (sentOut || []).length;
    const badges = computeBadges(badgeStats);
    const earnedBadges = badges.filter(b => b.earned);

    const topBuild = [...cars].sort((a, b) => (b.likes || 0) - (a.likes || 0))[0];
    const topBuildName = `${topBuild.year ? topBuild.year + ' ' : ''}${topBuild.make || ''} ${topBuild.model || ''}`.trim() || 'Unnamed Car';

    const data = {
      year, displayName, avatarLetter: (displayName[0] || '?').toUpperCase(),
      carsCount: cars.length, totalMods, badgesEarned: earnedBadges.length, badgesTotal: badges.length,
      repsYear, commentsRecvYear, commentsGivenYear, updatesYear,
      topBuildName, topBuildReps: topBuild.likes || 0,
      badgeEmojis: earnedBadges.map(b => b.icon),
    };

    root.innerHTML = `
      <h1 style="text-align:center;margin:1.5rem 0 0.25rem">🎁 Garage Wrapped</h1>
      <p class="muted-center" style="margin-bottom:1.25rem">${escapeHtml(displayName)}'s ${year} recap.</p>
      <div class="wrapped-canvas-wrap">
        <canvas id="wrapped-canvas" width="${WRAP.W}" height="${WRAP.H}"></canvas>
      </div>
      <div class="form-actions" style="margin-top:1rem">
        <button class="btn btn-primary" id="wrap-download" style="flex:1;justify-content:center">Download image</button>
        <button class="btn" id="wrap-share" style="flex:1;justify-content:center;display:none">Share</button>
        <button class="btn" id="wrap-copy-link" style="flex:1;justify-content:center">Copy link</button>
      </div>
      <p class="embed-hint" style="text-align:center;margin-top:0.75rem">Stats cover ${year} activity plus your all-time garage totals.</p>`;

    await drawWrapped(data);

    document.getElementById('wrap-download').onclick = () => downloadWrapped(data);
    document.getElementById('wrap-copy-link').onclick = async (e) => {
      try {
        await navigator.clipboard.writeText(location.href);
        const btn = e.currentTarget;
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1600);
      } catch (err) { showToast('Could not copy — select and copy manually.', 'error'); }
    };
    if (navigator.share && navigator.canShare) {
      const shareBtn = document.getElementById('wrap-share');
      shareBtn.style.display = '';
      shareBtn.onclick = () => shareWrapped(data);
    }
  }

  function emptyState(title, sub) {
    return `
      <div class="empty-state">
        <div class="empty-icon">${carIcon()}</div>
        <h3>${escapeHtml(title)}</h3>
        <p>${escapeHtml(sub)}</p>
        <p><a href="index.html" class="btn" style="margin-top:1rem">Back to Garage</a></p>
      </div>`;
  }

  // ─── Canvas rendering ──────────────────────────────────────────
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  async function drawWrapped(d) {
    try {
      await Promise.all([
        document.fonts.load('700 64px "Chakra Petch"'),
        document.fonts.load('700 40px "Chakra Petch"'),
        document.fonts.load('700 24px "Chakra Petch"'),
      ]);
    } catch (e) {}

    const canvas = document.getElementById('wrapped-canvas');
    const ctx = canvas.getContext('2d');
    const { W, H } = WRAP;

    // Background
    const bgGrad = ctx.createLinearGradient(0, 0, W, H);
    bgGrad.addColorStop(0, '#0d0d0f');
    bgGrad.addColorStop(1, '#16161a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Glow blob
    const glow = ctx.createRadialGradient(W * 0.85, H * 0.08, 0, W * 0.85, H * 0.08, 520);
    glow.addColorStop(0, 'rgba(230,48,48,0.28)');
    glow.addColorStop(1, 'rgba(230,48,48,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // Wordmark
    ctx.fillStyle = COLOR.accent;
    ctx.font = '700 26px "Chakra Petch", sans-serif';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('THE GARAGE', 64, 100);

    // Big heading
    ctx.fillStyle = COLOR.text;
    ctx.font = '700 96px "Chakra Petch", sans-serif';
    ctx.fillText(String(d.year), 64, 220);
    ctx.font = '700 64px "Chakra Petch", sans-serif';
    ctx.fillStyle = COLOR.accent;
    ctx.fillText('WRAPPED', 64, 288);

    // Avatar + name
    const avR = 34, avX = 64 + avR, avY = 360;
    ctx.beginPath();
    ctx.arc(avX, avY, avR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(230,48,48,0.15)';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(230,48,48,0.4)';
    ctx.stroke();
    ctx.fillStyle = '#f1a0a0';
    ctx.font = '700 30px "Chakra Petch", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.avatarLetter, avX, avY + 11);
    ctx.textAlign = 'left';
    ctx.fillStyle = COLOR.text;
    ctx.font = '700 32px "Chakra Petch", sans-serif';
    ctx.fillText(d.displayName, 64 + avR * 2 + 20, avY + 11);

    // Stat grid
    const stats = [
      [String(d.carsCount), d.carsCount === 1 ? 'CAR IN THE GARAGE' : 'CARS IN THE GARAGE'],
      [String(d.totalMods), 'MODS INSTALLED'],
      [String(d.repsYear), `REPS EARNED IN ${d.year}`],
      [String(d.commentsRecvYear), `COMMENTS RECEIVED`],
      [String(d.updatesYear), `BUILD UPDATES POSTED`],
      [`${d.badgesEarned}/${d.badgesTotal}`, 'ACHIEVEMENTS UNLOCKED'],
    ];
    const gridTop = 440, gap = 24, cols = 2;
    const cardW = (W - 64 * 2 - gap) / cols, cardH = 150;
    stats.forEach(([num, label], i) => {
      const col = i % cols, row = Math.floor(i / cols);
      const x = 64 + col * (cardW + gap), y = gridTop + row * (cardH + gap);
      roundRect(ctx, x, y, cardW, cardH, 16);
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = COLOR.border;
      ctx.stroke();
      ctx.fillStyle = COLOR.text;
      ctx.font = '700 52px "Chakra Petch", sans-serif';
      ctx.fillText(num, x + 24, y + 76);
      ctx.fillStyle = COLOR.muted;
      ctx.font = '600 18px "Chakra Petch", sans-serif';
      wrapText(ctx, label, x + 24, y + 108, cardW - 48, 22);
    });

    // Top build callout
    const tbY = gridTop + 3 * (cardH + gap) + 8;
    roundRect(ctx, 64, tbY, W - 128, 96, 16);
    ctx.fillStyle = 'rgba(230,48,48,0.08)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(230,48,48,0.25)';
    ctx.stroke();
    ctx.fillStyle = COLOR.accent;
    ctx.font = '700 16px "Chakra Petch", sans-serif';
    ctx.fillText('TOP BUILD', 96, tbY + 34);
    ctx.fillStyle = COLOR.text;
    ctx.font = '700 30px "Chakra Petch", sans-serif';
    ctx.fillText(`${d.topBuildName}  ·  ${d.topBuildReps} reps`, 96, tbY + 70);

    // Badge row
    if (d.badgeEmojis.length) {
      ctx.font = '38px sans-serif';
      ctx.fillStyle = COLOR.text;
      let bx = 64;
      const by = tbY + 96 + 70;
      d.badgeEmojis.slice(0, 12).forEach(icon => {
        ctx.fillText(icon, bx, by);
        bx += 52;
      });
    }

    // Footer
    ctx.fillStyle = COLOR.dim;
    ctx.font = '600 20px "Chakra Petch", sans-serif';
    ctx.fillText('ourgarage.pages.dev', 64, H - 56);
    ctx.textAlign = 'right';
    ctx.fillText('Every build has a story.', W - 64, H - 56);
    ctx.textAlign = 'left';
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '', ly = y;
    for (const w of words) {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > maxWidth && line) {
        ctx.fillText(line, x, ly);
        line = w; ly += lineHeight;
      } else line = test;
    }
    if (line) ctx.fillText(line, x, ly);
  }

  function canvasBlob() {
    return new Promise(resolve => document.getElementById('wrapped-canvas').toBlob(resolve, 'image/png'));
  }

  async function downloadWrapped(d) {
    const blob = await canvasBlob();
    if (!blob) { showToast('Could not generate image.', 'error'); return; }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `garage-wrapped-${d.year}.png`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  }

  async function shareWrapped(d) {
    const blob = await canvasBlob();
    if (!blob) return;
    const file = new File([blob], `garage-wrapped-${d.year}.png`, { type: 'image/png' });
    try {
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'My Garage Wrapped', text: `My ${d.year} on The Garage.` });
      } else {
        await navigator.share({ title: 'My Garage Wrapped', url: location.href });
      }
    } catch (e) { /* user cancelled or unsupported — no-op */ }
  }

  init();
</script>
