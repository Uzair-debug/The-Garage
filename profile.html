<main>
  <div id="profile-root">

  </div>
</main>

<footer>
  <div class="footer-logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M5 17h-2v-6l2 -5h9l4 4h1a2 2 0 0 1 2 2v5h-2m-4 0h-6m-6 -6h15m-6 0v-5"/></svg>
    The <span>Garage</span>
  </div>
  <div class="footer-links">

    <a href="leaderboard.html">Leaderboard</a>
    <a href="compare.html">Compare</a>

</footer>

<script src="app.js"></script>
<script src="auth.js"></script>
<script src="push.js"></script>
<script>
  let _profileUserId = null;

  async function init() {
    initAuth();
    const params = new URLSearchParams(location.search);
    const userId = params.get('id');
    _profileUserId = userId;

    if (!userId) {
      document.getElementById('profile-root').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">${carIcon()}</div>
          <h3>No profile found</h3>
          <p><a href="index.html" class="btn" style="margin-top:1rem">Back to Garage</a></p>
        </div>`;
      return;
    }

    const [cars, currentUser, card] = await Promise.all([
      getCarsByUser(userId),
      getCurrentUser(),
      getMemberCard(userId),
      initLikes(),
    ]);

    const isMe = currentUser && currentUser.id === userId;
    const displayName = (card && card.display_name)
      || (cars.length ? (cars[0].owner || 'Unknown') : 'Unknown');
    const totalMods = cars.reduce((n, c) => n + (c.mods ? c.mods.length : 0), 0);
    const totalReps = cars.reduce((n, c) => n + (c.likes || 0), 0);

    // Achievement stats — comments/updates counts and OG/monthly checks all
    // read from public tables, so they work when viewing anyone's profile.
    const [updatesCount, commentsCount, ogIds, momentum, sentIn, sentOut] = await Promise.all([
      getUpdateCountByUser(userId),
      getCommentCountByUser(userId),
      getOGBuilderIds(),
      getMonthlyMomentum(),
      isMe ? getMyCallouts() : Promise.resolve(null),
      isMe ? getMySentCallouts() : Promise.resolve(null),
    ]);
    const isBuildOfMonth = !!momentum.topId && cars.some(c => c.id === momentum.topId);
    const badgeStats = {
      carsCount: cars.length,
      totalMods,
      totalReps,
      updatesCount,
      commentsCount,
      isOG: ogIds.has(userId),
      isBuildOfMonth,
    };
    if (isMe) badgeStats.calloutCount = (sentIn || []).length + (sentOut || []).length;
    const badgeWallHtml = renderBadgeWall(computeBadges(badgeStats));

    document.title = `${displayName} – The Garage`;

    const avatarHtml = card && card.avatar
      ? `<img src="${encodeURI(thumbUrl(card.avatar))}" onerror="this.onerror=null;this.src='${encodeURI(card.avatar)}'" alt="${escapeHtml(displayName)}">`
      : escapeHtml((displayName[0] || '?').toUpperCase());

    document.getElementById('profile-root').innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${avatarHtml}</div>
        <div class="profile-info">
          <div>
            <div class="profile-name-row">
              <div class="profile-name">${escapeHtml(displayName)}</div>
              ${isMe ? '<div class="profile-you-badge">You</div>' : ''}
              ${isMe ? '<button class="btn btn-ghost" style="font-size:0.75rem;padding:0.3rem 0.7rem" onclick="toggleEditProfile()">Edit profile</button>' : ''}
            </div>
            ${card && card.bio ? `<p class="profile-bio">${escapeHtml(card.bio)}</p>` : ''}
          </div>
        </div>
        <div class="profile-stats">
          <div class="stat-pill">
            <span>${cars.length}</span>
            <label>${cars.length === 1 ? 'Car' : 'Cars'}</label>
          </div>
          <div class="stat-pill">
            <span>${totalMods}</span>
            <label>Mods</label>
          </div>
          <div class="stat-pill">
            <span>${totalReps}</span>
            <label>Reps</label>
          </div>
        </div>
      </div>

      ${badgeWallHtml}

      ${isMe ? `
      <div class="form-section profile-edit" id="profile-edit" style="display:none">
        <h3>Edit profile</h3>
        <div class="field">
          <label>Display name</label>
          <input type="text" id="pe-name" maxlength="40" value="${escapeHtml((card && card.display_name) || '')}" placeholder="How the crew knows you">
        </div>
        <div class="field">
          <label>Bio</label>
          <textarea id="pe-bio" class="text-area" maxlength="300" placeholder="What you drive, what you're building…">${escapeHtml((card && card.bio) || '')}</textarea>
        </div>
        <div class="field">
          <label>Avatar</label>
          <label class="btn" style="position:relative;overflow:hidden">
            <input type="file" id="pe-avatar" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer">
            <span id="pe-avatar-label">${card && card.avatar ? 'Change photo' : 'Upload photo'}</span>
          </label>
        </div>
        <div class="form-actions" style="margin-top:1rem">
          <button class="btn" onclick="toggleEditProfile()">Cancel</button>
          <button class="btn btn-primary" id="pe-save" onclick="saveProfile()">Save profile</button>
        </div>
      </div>` : ''}

      ${cars.length === 0 ? `
        <div class="empty-state" style="padding:3rem 0">
          <div class="empty-icon">${carIcon()}</div>
          <h3>No cars yet</h3>
          <p>Nothing in the garage.</p>
          ${isMe ? `<a href="add.html" class="btn btn-primary" style="margin-top:1.5rem">Add your first car</a>` : ''}
        </div>` : `
        <div class="car-grid" id="car-grid">
          ${cars.map(car => renderCarCard(car, { showOwner: false })).join('')}
        </div>`}`;

    initCardExtras(document.getElementById('profile-root'));
    applyMonthRibbon(document.getElementById('profile-root'), momentum.topId);

    const av = document.getElementById('pe-avatar');
    if (av) av.addEventListener('change', function () {
      document.getElementById('pe-avatar-label').textContent =
        this.files.length ? '1 photo selected' : 'Upload photo';
    });
  }

  function toggleEditProfile() {
    const el = document.getElementById('profile-edit');
    if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
  }

  async function saveProfile() {
    const btn = document.getElementById('pe-save');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const card = {
        display_name: document.getElementById('pe-name').value.trim() || null,
        bio: document.getElementById('pe-bio').value.trim() || null,
      };
      const file = document.getElementById('pe-avatar').files[0];
      if (file) card.avatar = await uploadPhoto(file);
      await saveMemberCard(card);
      showToast('Profile saved!');
      setTimeout(() => location.reload(), 700);
    } catch (e) {
      console.error(e);
      showToast('Could not save profile.', 'error');
      btn.disabled = false; btn.textContent = 'Save profile';
    }
  }

  init();
</script>

</html>
