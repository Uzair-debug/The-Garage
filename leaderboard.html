    <head>

        <meta name="description" content="Most repped builds and top owners in The Garage.">

        <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,600;0,700;1,700&display=swap" rel="stylesheet">
    </head>
    <body>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="bg.js"></script>

        <nav>
            <div class="nav-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M5 17h-2v-6l2 -5h9l4 4h1a2 2 0 0 1 2 2v5h-2m-4 0h-6m-6 -6h15m-6 0v-5"/></svg>
                <a href="index.html">The
                    <span style="color:var(--accent)">Garage</span>
                </a>
            </div>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-ghost">← All Cars</a>
            </div>
        </nav>

        <main style="max-width:760px">
            <h2 class="section-title" style="margin-top:1.5rem">Most Repped Builds</h2>
            <div class="detail-card" id="lb-builds">
                <p class="dim-note">Loading…</p>
            </div>

            <h2 class="section-title">Top Owners</h2>
            <div class="detail-card" id="lb-owners">
                <p class="dim-note">Loading…</p>
            </div>
        </main>

        <footer>
            <div class="footer-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M5 17h-2v-6l2 -5h9l4 4h1a2 2 0 0 1 2 2v5h-2m-4 0h-6m-6 -6h15m-6 0v-5"/></svg>
                The
                <span>Garage</span>
            </div>
            <div class="footer-links">
                <a href="index.html">Garage</a>
                <a href="compare.html">Compare</a>
                <a href="activity.html">Activity</a>
                <a href="feed.xml" title="RSS feed of crew activity">RSS</a>
                <a href="https://dragy.pages.dev" target="_blank" rel="noopener">Dragy</a>
            </div>
            <p>Built by the crew, for the crew. Every build has a story.</p>
        </footer>

        <script src="app.js"></script>
        <script src="auth.js"></script>
        <script src="push.js"></script>
        <script>
            function rankBadge(i) {
                const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                return `<span class="lb-rank ${cls}">${i + 1}</span>`;
              }
            
              async function init() {
                initAuth();
                const cars = await getCars();
            
                // Top builds by reps
                const top = [...cars].filter(c => (c.likes || 0) > 0)
                  .sort((a, b) => (b.likes || 0) - (a.likes || 0)).slice(0, 10);
                document.getElementById('lb-builds').innerHTML = top.length ? top.map((c, i) => `
                  <a class="lb-row" href="car.html?id=${c.id}">
                    ${rankBadge(i)}
                    ${c.photos && c.photos.length
                      ? `<img class="lb-img" src="${encodeURI(thumbUrl(c.photos[0]))}" onerror="this.onerror=null;this.src='${encodeURI(c.photos[0])}'" alt="" loading="lazy">`
                      : `<span class="lb-img lb-img-empty">${carIcon()}</span>`}
                    <span class="lb-name">${c.year ? escapeHtml(c.year) + ' ' : ''}${escapeHtml(c.make || '')} ${escapeHtml(c.model || '')}
                      <small>${escapeHtml(c.owner || '')}</small></span>
                    <span class="lb-reps">
                      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572z"/></svg>
                      ${c.likes}
                    </span>
                  </a>`).join('') : '<p class="dim-note">No reps yet — go show some builds love.</p>';
            
                // Top owners by total reps
                const owners = {};
                cars.forEach(c => {
                  if (!c.owner) return;
                  const o = owners[c.owner] = owners[c.owner] || { reps: 0, cars: 0, mods: 0, userId: c.user_id };
                  o.reps += c.likes || 0;
                  o.cars += 1;
                  o.mods += c.mods ? c.mods.length : 0;
                });
                const topOwners = Object.entries(owners)
                  .sort((a, b) => b[1].reps - a[1].reps || b[1].cars - a[1].cars).slice(0, 8);
                document.getElementById('lb-owners').innerHTML = topOwners.length ? topOwners.map(([name, o], i) => `
                  <a class="lb-row" href="${o.userId ? `profile.html?id=${o.userId}` : '#'}">
                    ${rankBadge(i)}
                    <span class="lb-avatar">${escapeHtml(name[0].toUpperCase())}</span>
                    <span class="lb-name">${escapeHtml(name)}
                      <small>${o.cars} car${o.cars === 1 ? '' : 's'} · ${o.mods} mods</small></span>
                    <span class="lb-reps">
                      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572z"/></svg>
                      ${o.reps}
                    </span>
                  </a>`).join('') : '<p class="dim-note">No owners yet.</p>';
              }
            
              init();
            </script>
            <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "a014c0b85d8e42e1add91d6ca4a12cce"}'></script>
</body>
            </html>
