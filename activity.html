<script>
  async function init() {
    initAuth();
    const [cars, comments, updates] = await Promise.all([
      getCars(),
      sb().from('car_comments').select('author,body,car_id,created_at').order('created_at', { ascending: false }).limit(20).then(r => r.data || []),
      sb().from('car_updates').select('title,car_id,created_at').order('created_at', { ascending: false }).limit(20).then(r => r.data || []),
    ]);

    const names = {};
    cars.forEach(c => {
      names[c.id] = `${c.year ? c.year + ' ' : ''}${c.make || ''} ${c.model || ''}`.trim() || 'a build';
    });

    const items = [];
    comments.forEach(c => items.push({
      t: new Date(c.created_at).getTime(),
      icon: '💬',
      html: `<strong>${escapeHtml(c.author || 'Someone')}</strong> commented on <a href="car.html?id=${c.car_id}">${escapeHtml(names[c.car_id] || 'a build')}</a>: <span class="feed-quote">“${escapeHtml(String(c.body).slice(0, 90))}”</span>`,
      when: c.created_at,
    }));
    updates.forEach(u => items.push({
      t: new Date(u.created_at).getTime(),
      icon: '🔧',
      html: `Build update on <a href="car.html?id=${u.car_id}">${escapeHtml(names[u.car_id] || 'a build')}</a>: <strong>${escapeHtml(u.title)}</strong>`,
      when: u.created_at,
    }));
    cars.slice(0, 8).forEach(c => {
      if (!c.updated_at) return;
      items.push({
        t: c.updated_at,
        icon: '🏁',
        html: `<a href="car.html?id=${c.id}">${escapeHtml(names[c.id])}</a>${c.owner ? ` by <strong>${escapeHtml(c.owner)}</strong>` : ''} was added or updated`,
        when: new Date(c.updated_at).toISOString(),
      });
    });

    items.sort((x, y) => y.t - x.t);
    const top = items.slice(0, 30);

    document.getElementById('feed').innerHTML = top.length ? top.map(i => `
      <div class="feed-item">
        <span class="feed-icon">${i.icon}</span>
        <div class="feed-main">
          <div class="feed-text">${i.html}</div>
          <div class="feed-time">${fmtDate(i.when, true)}</div>
        </div>
      </div>`).join('') : '<p class="dim-note">Nothing yet — go make some noise.</p>';
  }

  init();
</script>
