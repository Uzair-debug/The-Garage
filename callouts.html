<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Callouts – The Garage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="bg.js"></script>

<nav>
  <div class="nav-logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M5 17h-2v-6l2 -5h9l4 4h1a2 2 0 0 1 2 2v5h-2m-4 0h-6m-6 -6h15m-6 0v-5"/></svg>
    <a href="index.html">The <span style="color:var(--accent)">Garage</span></a>
  </div>
  <div class="nav-actions">
    <a href="index.html" class="btn btn-ghost">← All Cars</a>
  </div>
</nav>

<div class="form-page">
  <h1 id="page-title">Callouts</h1>
  <p class="subtitle" id="page-sub">Requests to link up about your cars.</p>
  <div id="callout-content">
    <p style="color:var(--text-muted);padding:2rem 0;text-align:center">Loading…</p>
  </div>
</div>

<script src="app.js"></script>
<script src="auth.js"></script>
<script>
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
      ' · ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }

  async function init() {
    initAuth();
    const user = await getCurrentUser();
    if (!user) {
      document.getElementById('callout-content').innerHTML = `
        <div style="text-align:center;padding:3rem 0;color:var(--text-muted)">
          <p style="font-size:1.05rem;margin-bottom:1rem">Sign in to see your callouts.</p>
          <button class="btn btn-primary" onclick="showAuthModal(()=>location.reload())">Sign in</button>
        </div>`;
      return;
    }

    const callouts = await getMyCallouts();
    render(callouts);

    // Mark everything read once viewed
    const unread = callouts.filter(c => !c.read).map(c => c.id);
    if (unread.length) {
      await markCalloutsRead(unread);
      const dot = document.getElementById('avatar-dot');
      if (dot) dot.style.display = 'none';
    }
  }

  function render(callouts) {
    if (!callouts.length) {
      document.getElementById('page-sub').textContent = 'Requests to link up about your cars.';
      document.getElementById('callout-content').innerHTML = `
        <div style="text-align:center;padding:3rem 0;color:var(--text-muted)">
          <p>No callouts yet. When someone requests a callout on one of your cars, it shows up here.</p>
        </div>`;
      return;
    }

    const unreadCount = callouts.filter(c => !c.read).length;
    document.getElementById('page-sub').textContent =
      `${callouts.length} request${callouts.length === 1 ? '' : 's'}` +
      (unreadCount ? ` · ${unreadCount} new` : '');

    document.getElementById('callout-content').innerHTML = callouts.map(c => {
      const car = c.car ? `${escapeHtml(car_label(c.car))}` : 'a car';
      return `
        <div class="form-section" style="${c.read ? '' : 'border-color:rgba(230,48,48,0.3)'}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px">
            <div style="font-weight:600">${escapeHtml(c.requester_email || 'Someone')}
              ${c.read ? '' : '<span class="badge badge-red" style="margin-left:6px;font-size:0.6rem">NEW</span>'}
            </div>
            <div style="font-size:0.75rem;color:var(--text-dim);white-space:nowrap">${fmtDate(c.created_at)}</div>
          </div>
          <div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:8px">wants a callout on your <strong style="color:var(--text)">${car}</strong></div>
          ${c.message ? `<div style="font-size:0.9rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem 0.75rem">${escapeHtml(c.message)}</div>` : ''}
          ${c.requester_email ? `<a class="btn" style="margin-top:10px;font-size:0.8rem" href="mailto:${encodeURIComponent(c.requester_email)}?subject=Re: callout for your ${encodeURIComponent(car_label(c.car))}">Reply by email</a>` : ''}
        </div>`;
    }).join('');
  }

  function car_label(car) {
    if (!car) return 'car';
    return [car.make, car.model].filter(Boolean).join(' ') || 'car';
  }

  init();
</script>
</body>
</html>
