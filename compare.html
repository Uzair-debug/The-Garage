<script src="app.js"></script>
<script src="auth.js"></script>
<script src="push.js"></script>
<script>
  let cars = [];

  function carName(c) {
    return `${c.year ? c.year + ' ' : ''}${c.make || ''} ${c.model || ''}`.trim() || 'Unnamed Car';
  }

  async function init() {
    initAuth();
    cars = await getCars();
    const opts = ['<option value="">Select a build…</option>']
      .concat(cars.map(c => `<option value="${c.id}">${escapeHtml(carName(c))}</option>`)).join('');
    document.getElementById('pick-a').innerHTML = opts;
    document.getElementById('pick-b').innerHTML = opts;

    const p = new URLSearchParams(location.search);
    if (p.get('a')) document.getElementById('pick-a').value = p.get('a');
    if (p.get('b')) document.getElementById('pick-b').value = p.get('b');
    renderCompare();
  }

  function specVal(c, key) { return c && c[key] ? escapeHtml(String(c[key])) : '—'; }
  function powerNum(c) {
    const m = String(c.power || '').match(/[\d.]+/);
    return m ? parseFloat(m[0]) : null;
  }

  function renderCompare() {
    const a = cars.find(c => c.id === document.getElementById('pick-a').value);
    const b = cars.find(c => c.id === document.getElementById('pick-b').value);
    const root = document.getElementById('cmp-root');

    const url = new URL(location);
    if (a) url.searchParams.set('a', a.id); else url.searchParams.delete('a');
    if (b) url.searchParams.set('b', b.id); else url.searchParams.delete('b');
    history.replaceState(null, '', url);

    if (!a || !b) {
      root.innerHTML = '<p class="dim-note" style="text-align:center;padding:2rem 0">Pick two builds to compare.</p>';
      return;
    }

    const pa = powerNum(a), pb = powerNum(b);
    const head = (c) => `
      <div class="cmp-car">
        ${c.photos && c.photos.length
          ? `<img class="cmp-img" src="${encodeURI(thumbUrl(c.photos[0]))}" onerror="this.onerror=null;this.src='${encodeURI(c.photos[0])}'" alt="">`
          : `<div class="cmp-img cmp-img-empty">${carIcon()}</div>`}
        <a class="cmp-name" href="car.html?id=${c.id}">${escapeHtml(carName(c))}</a>
        <div class="cmp-owner">${escapeHtml(c.owner || '')}</div>
      </div>`;

    const rows = [
      ['Reps', `${a.likes || 0}`, `${b.likes || 0}`, (a.likes || 0) === (b.likes || 0) ? 0 : ((a.likes || 0) > (b.likes || 0) ? 1 : 2)],
      ['Status', specVal(a, 'status'), specVal(b, 'status'), 0],
      ['Engine', specVal(a, 'engine'), specVal(b, 'engine'), 0],
      ['Power', specVal(a, 'power'), specVal(b, 'power'), pa !== null && pb !== null && pa !== pb ? (pa > pb ? 1 : 2) : 0],
      ['Drivetrain', specVal(a, 'drivetrain'), specVal(b, 'drivetrain'), 0],
      ['Colour', specVal(a, 'colour'), specVal(b, 'colour'), 0],
      ['Mods', `${a.mods ? a.mods.length : 0}`, `${b.mods ? b.mods.length : 0}`,
        (a.mods ? a.mods.length : 0) === (b.mods ? b.mods.length : 0) ? 0 : ((a.mods ? a.mods.length : 0) > (b.mods ? b.mods.length : 0) ? 1 : 2)],
    ];

    root.innerHTML = `
      <div class="cmp-heads">${head(a)}<div class="cmp-vs-big">VS</div>${head(b)}</div>
      <div class="detail-card">
        ${rows.map(([label, va, vb, win]) => `
          <div class="cmp-row">
            <span class="cmp-val ${win === 1 ? 'win' : ''}">${va}</span>
            <span class="cmp-label">${label}</span>
            <span class="cmp-val right ${win === 2 ? 'win' : ''}">${vb}</span>
          </div>`).join('')}
      </div>`;
  }

  init();
</script>
