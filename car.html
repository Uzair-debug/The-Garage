<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car – The Garage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="bg.js"></script>

<nav>
  <div class="nav-logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M5 17h-2v-6l2 -5h9l4 4h1a2 2 0 0 1 2 2v5h-2m-4 0h-6m-6 -6h15m-6 0v-5"/></svg>
    <a href="index.html">The <span style="color:var(--accent)">Garage</span></a>
  </div>
  <div class="nav-actions">
    <a href="index.html" class="btn btn-ghost">← All Cars</a>
  </div>
</nav>

<div class="car-detail" id="car-detail">
  <p style="color:var(--text-muted);padding:3rem 0;text-align:center">Loading…</p>
</div>

<script src="app.js"></script>
<script src="auth.js"></script>
<script>
  const CAT_COLORS = {
    Engine:'#e63030', Exhaust:'#ef9f27', Suspension:'#378add',
    Exterior:'#1d9e75', Wheels:'#7f77dd', Interior:'#639922',
    Brakes:'#d85a30', Audio:'#d4537e', Other:'#888780'
  };

  function normalizeMod(m) { return typeof m === 'string' ? { cat: 'Other', name: m } : m; }

  async function init() {
    initAuth();
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const [car, currentUser] = await Promise.all([
      id ? getCar(id) : null,
      getCurrentUser()
    ]);

    if (!car) {
      document.getElementById('car-detail').innerHTML = `
        <div style="text-align:center;padding:4rem 0;color:var(--text-muted)">
          <p style="font-size:1.1rem;margin-bottom:1rem">Car not found.</p>
          <a href="index.html" class="btn">Back to Garage</a>
        </div>`;
      return;
    }

    const isOwner = !!currentUser && (car.user_id === currentUser.id || isAdmin(currentUser));
    document.title = `${car.year ? car.year + ' ' : ''}${car.make} ${car.model} – The Garage`;
    render(car, isOwner);
  }

  function render(car, isOwner) {
    const title = escapeHtml([car.make, car.model].filter(Boolean).join(' ') || 'Unnamed Car');
    const meta = escapeHtml([car.year, car.drivetrain, car.colour].filter(Boolean).join(' · '));

    // Status badge
    const statusMeta = STATUS_META[car.status];
    const statusBadge = statusMeta
      ? `<span class="status-badge" style="background:${statusMeta.bg};color:${statusMeta.color};border:1px solid ${statusMeta.color}44">${escapeHtml(car.status)}</span>`
      : '';

    // Gallery
    let galleryHtml = '';
    if (car.photos && car.photos.length) {
      const thumbs = car.photos.map((src, i) => `
        <div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="setPhoto(${i})">
          <img src="${encodeURI(src)}" alt="Photo ${i + 1}">
        </div>`).join('');
      galleryHtml = `
        <div class="photo-gallery">
          <div class="gallery-main">
            <img id="gallery-main-img" src="${encodeURI(car.photos[0])}" alt="${title}" onclick="openLightbox()">
          </div>
          ${car.photos.length > 1 ? `<div class="gallery-thumbs">${thumbs}</div>` : ''}
        </div>`;
    } else {
      galleryHtml = `
        <div class="photo-gallery">
          <div class="gallery-main">
            <div class="no-photo"><span>${carIcon()}</span><p>No photos yet</p></div>
          </div>
        </div>`;
    }

    // Specs
    const specRows = [
      ['Make', car.make], ['Model', car.model], ['Year', car.year],
      ['Engine', car.engine], ['Power', car.power], ['Drivetrain', car.drivetrain],
      ['Colour', car.colour], ['Status', car.status], ['Owner', car.owner],
    ].filter(([, v]) => v);

    const specsHtml = specRows.length
      ? specRows.map(([k, v]) => `<div class="spec-row"><span class="spec-label">${k}</span><span class="spec-value">${escapeHtml(v)}</span></div>`).join('')
      : '<p style="color:var(--text-dim);font-size:0.85rem">No specs added.</p>';

    // Mods
    let modsHtml = '<p style="color:var(--text-dim);font-size:0.85rem">No mods listed.</p>';
    if (car.mods && car.mods.length) {
      const grouped = {};
      car.mods.map(normalizeMod).forEach(m => { (grouped[m.cat] = grouped[m.cat] || []).push(m.name); });
      modsHtml = Object.entries(grouped).map(([cat, names]) => {
        const color = CAT_COLORS[cat] || CAT_COLORS.Other;
        return `
          <div class="mods-group">
            <div class="mods-group-header">
              <span class="mods-group-dot" style="background:${color}"></span>${escapeHtml(cat)}
            </div>
            ${names.map(n => `
              <div class="mod-detail-item">
                <span class="mod-detail-dot" style="background:${color}"></span><span>${escapeHtml(n)}</span>
              </div>`).join('')}
          </div>`;
      }).join('');
    }

    // Like button
    const liked = hasLiked(car.id);
    const likeHtml = `
      <button class="like-btn like-btn-lg ${liked ? 'liked' : ''}" id="like-btn" onclick="handleLike('${car.id}')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/></svg>
        <span id="like-count">${car.likes || 0}</span> ${car.likes === 1 ? 'rep' : 'reps'}
      </button>`;

    // Instagram
    const igHandle = (car.instagram || '').replace(/[^A-Za-z0-9._]/g, '');
    const igHtml = igHandle
      ? `<a class="ig-link" href="https://instagram.com/${encodeURIComponent(igHandle)}" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 4m0 4a4 4 0 0 1 4 -4h8a4 4 0 0 1 4 4v8a4 4 0 0 1 -4 4h-8a4 4 0 0 1 -4 -4z"/><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/><path d="M16.5 7.5l0 .01"/></svg>
          @${escapeHtml(igHandle)}
        </a>` : '';

    document.getElementById('car-detail').innerHTML = `
      <div class="car-detail-header">
        <div class="car-detail-title">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px">
            <h1 style="margin:0">${title}</h1>
            ${statusBadge}
          </div>
          ${meta ? `<p class="year-make">${meta}</p>` : ''}
          ${igHtml}
        </div>
        <div class="car-detail-actions">
          ${likeHtml}
          ${isOwner ? `<a href="add.html?id=${car.id}" class="btn">Edit</a>` : ''}
          ${isOwner ? `<button class="btn btn-danger" onclick="confirmDelete('${car.id}')">Delete</button>` : ''}
        </div>
      </div>

      ${galleryHtml}

      <div class="detail-sections">
        <div class="detail-card">
          <h3>Specs</h3>
          ${specsHtml}
        </div>
        <div class="detail-card">
          <h3>Mods · ${car.mods ? car.mods.length : 0}</h3>
          ${modsHtml}
        </div>
      </div>`;

    // store photos ref for gallery
    window._photos = car.photos || [];
  }

  function setPhoto(idx) {
    window._currentPhoto = idx;
    const img = document.getElementById('gallery-main-img');
    if (img) img.src = window._photos[idx];
    document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
  }

  // ─── Lightbox ──────────────────────────────────────────────────
  function openLightbox() {
    const photos = window._photos || [];
    if (!photos.length || document.getElementById('lightbox')) return;
    let idx = window._currentPhoto || 0;

    const box = document.createElement('div');
    box.id = 'lightbox';
    box.className = 'lightbox';
    const multi = photos.length > 1;
    box.innerHTML = `
      <button class="lightbox-close" title="Close (Esc)">&times;</button>
      ${multi ? `<button class="lightbox-nav prev" title="Previous">&#8249;</button>` : ''}
      <img id="lightbox-img" src="${encodeURI(photos[idx])}" alt="Photo">
      ${multi ? `<button class="lightbox-nav next" title="Next">&#8250;</button>` : ''}
      ${multi ? `<div class="lightbox-count"><span id="lightbox-count">${idx + 1}</span> / ${photos.length}</div>` : ''}`;
    document.body.appendChild(box);
    document.body.style.overflow = 'hidden';

    const show = i => {
      idx = (i + photos.length) % photos.length;
      document.getElementById('lightbox-img').src = encodeURI(photos[idx]);
      const c = document.getElementById('lightbox-count');
      if (c) c.textContent = idx + 1;
      setPhoto(idx); // keep the page gallery in sync
    };

    box.querySelector('.lightbox-close').onclick = closeLightbox;
    if (multi) {
      box.querySelector('.prev').onclick = e => { e.stopPropagation(); show(idx - 1); };
      box.querySelector('.next').onclick = e => { e.stopPropagation(); show(idx + 1); };
    }
    box.onclick = e => { if (e.target === box) closeLightbox(); };

    box._keyHandler = e => {
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowRight' && multi) show(idx + 1);
      else if (e.key === 'ArrowLeft' && multi) show(idx - 1);
    };
    document.addEventListener('keydown', box._keyHandler);

    // Swipe gestures (mobile)
    let startX = 0, startY = 0;
    box.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    }, { passive: true });
    box.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        if (multi) show(idx + (dx < 0 ? 1 : -1));
      } else if (dy > 80 && Math.abs(dy) > Math.abs(dx)) {
        closeLightbox(); // swipe down to dismiss
      }
    }, { passive: true });
  }

  function closeLightbox() {
    const box = document.getElementById('lightbox');
    if (!box) return;
    document.removeEventListener('keydown', box._keyHandler);
    box.remove();
    document.body.style.overflow = '';
  }

  async function handleLike(id) {
    const btn = document.getElementById('like-btn');
    if (hasLiked(id) || !btn) return;
    const success = await likeCar(id);
    if (success) {
      const countEl = document.getElementById('like-count');
      const newCount = parseInt(countEl.textContent) + 1;
      countEl.textContent = newCount;
      btn.nextSibling && (btn.innerHTML = btn.innerHTML.replace(/\d+ rep/, `${newCount} rep`));
      btn.classList.add('liked');
      btn.querySelector('svg').setAttribute('fill', 'currentColor');
      btn.innerHTML = btn.innerHTML.replace('0 reps', `${newCount} rep${newCount === 1 ? '' : 's'}`);
    }
  }

  async function confirmDelete(id) {
    if (!confirm('Delete this car? This cannot be undone.')) return;
    await deleteCar(id);
    location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
